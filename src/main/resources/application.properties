spring.application.name=spring-boot-final-project

# Database Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/FoodSecDB
spring.datasource.username=postgres
spring.datasource.password=root

#hibernate properties
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# JWT Properties
jwt.secret=mySecretKeyForJWT123456789012345678901234567890
jwt.expiration=86400

#Java Mail Sender Properties

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# Server Configuration
server.port=${SERVER_PORT:8080}

# Frontend Configuration
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
